<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI聊天</title>
    <link rel="icon" href="common/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/xs-styles.css">
    <link href="css/material-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-area {
            height: 60%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            background-image: linear-gradient(to bottom, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.0) 100%);
            opacity: 1;
        }

        .chat-container.hidden {
            opacity: 0;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            position: relative;
        }

        .message.ai .message-content {
            background-color: #e0e0e0;
            color: #333;
        }

        .message.user .message-content {
            background-color: #FF2442; /* 品牌红色 */
            color: #fff;
        }

        .input-container {
            display: flex;
            align-items: center;
            padding: 10px;
            background-color: #ffffff00;
            /* border-top: 1px solid #ddd; */
        }

        .input-container.hidden {
            display: none; /* 完全隐藏并不占空间 */
        }

        .input-area {
            display: flex;
            align-items: center;
            background-color: #f0f0f0;
            border-radius: 25px;
            padding: 6px;
            height: 50px;
            box-sizing: border-box;
            width: 100%;
        }

        .input-area input {
            display: none;
        }

        .input-area button {
            display: none;
        }

        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background-color: #ffffff00;
        }

        .mute-button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background-color: #f0f0f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .mute-button:hover {
            background-color: #e0e0e0;
        }

        .mute-button.muted {
            background-color: #FF2442;
            color: white;
        }

        .mute-button .material-icons {
            font-size: 24px;
            color: #666;
        }

        .mute-button.muted .material-icons {
            color: white;
        }

        .status-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .status-text {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .status-text.muted-text {
            color: #FF2442;
        }

        .status-text.listening-text {
            color: #4CAF50;
        }

        .voice-waves {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 24px;
        }

        .voice-wave {
            width: 3px;
            height: 8px;
            background-color: #FF2442;
            border-radius: 2px;
            animation: wave 0.5s ease-in-out infinite;
        }

        .voice-wave:nth-child(1) { animation-delay: 0s; }
        .voice-wave:nth-child(2) { animation-delay: 0.1s; }
        .voice-wave:nth-child(3) { animation-delay: 0.2s; }
        .voice-wave:nth-child(4) { animation-delay: 0.3s; }
        .voice-wave:nth-child(5) { animation-delay: 0.4s; }

        .voice-wave.active {
            background-color: #4CAF50;
        }

        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 20px; }
        }

        .close-button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background-color: #f0f0f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-button:hover {
            background-color: #FF2442;
            color: white;
        }

        .close-button .material-icons {
            font-size: 24px;
            color: #666;
        }

        .close-button:hover .material-icons {
            color: white;
        }

        .interrupt-hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <!-- 上半区域 -->
    <div class="top-area"></div>

    <!-- 聊天容器 -->
    <div class="chat-container" id="chat-container">
        <!-- 聊天记录将显示在这里 -->
    </div>

    <!-- 底部栏 -->
    <div class="bottom-bar">
        <button class="mute-button" id="mute-button" title="静音">
            <i class="material-icons">volume_up</i>
        </button>
        
        <div class="status-area">
            <div class="status-text" id="status-text">点击开始聊天</div>
            <div class="voice-waves" id="voice-waves">
                <div class="voice-wave"></div>
                <div class="voice-wave"></div>
                <div class="voice-wave"></div>
                <div class="voice-wave"></div>
                <div class="voice-wave"></div>
            </div>
            <div class="interrupt-hint" id="interrupt-hint">点击打断</div>
        </div>
        
        <button class="close-button" id="close-button" title="关闭对话">
            <i class="material-icons">close</i>
        </button>
    </div>
    <script src="js/xsComponents.js"></script>
    <script src="js/cosyvoiceApi.js"></script>
    <script src="js/tencentTtsApi.js"></script>
    <script src="js/audioPlayer.js"></script>
    <script src="js/audioRecorder.js"></script>
    <script src="js/embedding.js"></script>
    <script src="js/dialogRealtime.js"></script>
</body>
</html>
